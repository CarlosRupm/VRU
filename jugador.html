<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha jugador | Vallecas Rugby Union</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <p class="kicker">Ficha individual</p>
        <h1 id="player-name">Jugador</h1>
        <p class="subtitle" id="player-team">Equipo</p>
      </header>

      <section class="panel">
        <div class="player-page-head">
          <img id="player-photo" class="player-page-photo" alt="Foto del jugador" />
          <ul class="stats-list" id="player-summary"></ul>
        </div>

        <h3>Estadísticas por partido (con línea de media)</h3>
        <div class="analytics-grid" id="player-charts"></div>

        <h3>Evolución por partido</h3>
        <ul class="player-stats" id="player-history"></ul>
        <p><a class="player-link" href="index.html">← Volver al panel</a></p>
      </section>
    </main>

    <script>
      const METRICS = [
        ['placajes', 'Placajes'],
        ['placajes_fallados', 'Placajes fallados'],
        ['metros', 'Metros'],
        ['tiempo_juego', 'Tiempo de juego'],
        ['ensayos', 'Ensayos'],
        ['patadas', 'Patadas'],
      ];

      const params = new URLSearchParams(window.location.search);
      const team = params.get('team');
      const playerName = params.get('player');
      const stateRaw = localStorage.getItem('vruCsvState');
      const state = stateRaw ? JSON.parse(stateRaw) : null;

      const nameEl = document.getElementById('player-name');
      const teamEl = document.getElementById('player-team');
      const photoEl = document.getElementById('player-photo');
      const summaryEl = document.getElementById('player-summary');
      const historyEl = document.getElementById('player-history');
      const chartsEl = document.getElementById('player-charts');

      if (!state || !team || !playerName || !state.teamData?.[team]?.[playerName]) {
        nameEl.textContent = 'Jugador no encontrado';
        teamEl.textContent = 'Primero carga CSV en la página principal y abre de nuevo la ficha.';
      } else {
        const p = state.teamData[team][playerName];
        nameEl.textContent = playerName;
        teamEl.textContent = `Equipo ${team}`;
        photoEl.src = p.foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(playerName)}&background=222&color=fff`;

        summaryEl.innerHTML = `
          <li><span>Posición</span><strong>${p.posicion}</strong></li>
          <li><span>Partidos</span><strong>${p.matches}</strong></li>
        `;

        const historyRows = p.history
          .map(
            (m) => `<li><span>${m.matchName}</span><strong>${m.placajes} pla · ${m.placajes_fallados} fall · ${m.metros} m · ${m.tiempo_juego} min · ${m.ensayos} ens · ${m.patadas} pat</strong></li>`,
          )
          .join('');
        historyEl.innerHTML = historyRows;

        chartsEl.innerHTML = METRICS.map(([key, label]) => {
          const values = p.history.map((m) => Number(m[key] || 0));
          const max = Math.max(...values, 1);
          const avg = values.reduce((a, b) => a + b, 0) / Math.max(values.length, 1);
          const points = values
            .map((value, i) => {
              const x = (i / Math.max(values.length - 1, 1)) * 100;
              const y = 100 - (value / max) * 100;
              return `${x},${y}`;
            })
            .join(' ');
          const avgY = 100 - (avg / max) * 100;
          const labels = values.map((_, i) => `<span>J${i + 1}</span>`).join('');

          return `
            <article class="analytics-card">
              <div class="analytics-top">
                <strong>${label}</strong>
                <span>Media: ${avg.toFixed(1)}</span>
              </div>
              <div class="line-chart">
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="${label}">
                  <line class="avg-line" x1="0" y1="${avgY}" x2="100" y2="${avgY}"></line>
                  <polyline class="line-path" points="${points}"></polyline>
                </svg>
              </div>
              <div class="journey-labels">${labels}</div>
            </article>
          `;
        }).join('');
      }
    </script>
  </body>
</html>
